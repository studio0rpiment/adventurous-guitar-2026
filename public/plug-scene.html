            if (inCyl(a) && inCyl(b) && inCyl(c)) { asg = f; break; } // all 3 verts inside → no bridging shards
          }
          if (asg >= 0) feat[asg].push(a, b, c); else body.push(a, b, c);
        }
        geo.setIndex(new THREE.BufferAttribute(new IndexArr(body), 1)); geo.computeBoundingSphere();
        FEATURES.forEach((F, f) => {
          if (!feat[f].length) return;
          const g2 = new THREE.BufferGeometry();
          g2.setAttribute("position", pos);
          if (geo.attributes.normal) g2.setAttribute("normal", geo.attributes.normal);
          if (geo.attributes.uv) g2.setAttribute("uv", geo.attributes.uv);
          g2.setIndex(new THREE.BufferAttribute(new IndexArr(feat[f]), 1)); g2.computeBoundingSphere();
          const material = F.kind === "led"
            ? new THREE.MeshStandardMaterial({ color: 0x330000, emissive: 0xff2a2a, emissiveIntensity: 0, roughness: 0.35 })
            : (F.mat || mesh.material);
          const fmesh = new THREE.Mesh(g2, material);
          fmesh.castShadow = true;
          if (F.kind === "static") { mesh.add(fmesh); return; }          // silver nut/shaft, doesn't move
          if (F.kind === "led") { mesh.add(fmesh); knobs.push({ F, mesh: fmesh, kind: "led", deviceName }); return; }
          fmesh.position.set(-F.x, -F.y, 0);
          const pivot = new THREE.Group(); pivot.position.set(F.x, F.y, 0); pivot.add(fmesh); mesh.add(pivot);
          knobs.push({ F, pivot, mesh: fmesh, kind: F.kind, deviceName, value: 0.5, pos: 1, engaged: false, pressAt: -1e5 });
        });
      }
      function applyKnob(k) {
        if (k.kind === "toggle") k.pivot.rotation.z = TOGGLE_ANGLES[k.pos - 1];
        else if (k.kind === "knob") k.pivot.rotation.z = -(k.value - 0.5) * KNOB_SWEEP;
      }
      function updateParams() {
        const by = {};
        knobs.forEach((k) => { (by[k.deviceName] = by[k.deviceName] || []).push(k); });
        let s = "";
        for (const dev in by) {
          s += dev + "\n";
          by[dev].forEach((k) => {
            if (k.kind === "led") return;
            if (k.kind === "toggle") s += "  " + dev + "-smalltogglePosition" + k.pos + "\n";
            else if (k.kind === "button") s += "  " + dev + "-footswitch: " + (k.engaged ? "on" : "off") + "\n";
            else s += "  " + dev + "-" + k.F.key + ": " + k.value.toFixed(2) + "\n";
          });
        }
        paramsEl.textContent = s;
      }

      const sockets = [];
      const pedalBoxes = [];
      pedals.forEach((pd) => {
        const grp = new THREE.Group();
        grp.position.set(pd.x, 0, 0);
        grp.rotation.y = pd.ry;
        const size = normalizePedal(pd.model);
        grp.add(pd.model);
        splitPedal(pd.model, pd.name);
        scene.add(grp);
        grp.updateWorldMatrix(true, false);
        // both jacks per pedal (-X input side and +X output side). A tight light at each
        // makes the pedal's own metal hex nut shine when a plug approaches.
        const jackLocals = [
          new THREE.Vector3(-size.x * 0.5, size.y * 0.207, size.z * 0.105),
          new THREE.Vector3(size.x * 0.5, size.y * 0.207, -size.z * 0.10),
        ];
        jackLocals.forEach((local, k) => {
          const wpos = local.clone().applyMatrix4(grp.matrixWorld);
          const dir = new THREE.Vector3(k === 0 ? -1 : 1, 0, 0).applyQuaternion(grp.quaternion).normalize();
          const light = new THREE.PointLight(0xfff2e0, 0, 1.05, 2);
          light.position.copy(wpos).addScaledVector(dir, 0.14); light.position.y += 0.04;
          scene.add(light);
          if (DEBUG) { const s = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({ color: 0xff2255 })); s.position.copy(wpos); scene.add(s); }
          sockets.push({ pos: wpos, dir, light });
        });
        // collision box for this pedal (in world), so the cable/plug can't pass through it
        pedalBoxes.push({
          mat: grp.matrixWorld.clone(), inv: grp.matrixWorld.clone().invert(),
          min: new THREE.Vector3(-size.x / 2, 0, -size.z / 2), max: new THREE.Vector3(size.x / 2, size.y, size.z / 2),
        });
      });
      knobs.forEach((k) => applyKnob(k));
      updateParams();

      const jackA = buildJack(jackAModel), jackB = buildJack(jackBModel);
      scene.add(jackA, jackB);

      // ---------- rope ----------
      const N = 22;
      const A0 = new THREE.Vector3(-2, CABLE_R, 4.2);
      const B0 = new THREE.Vector3(2, CABLE_R, 4.2);
      const REST = 8.0;
      const SEG = REST / (N - 1);
      const GRAV = -0.02, DAMP = 0.9, ITER = 20;   // regular gravity, well-damped like a real cable
      const BEND = 0.16, BEND_PASS = 3;   // cable stiffness — higher = more rigid (low-capacitance cable)
      // push a world point out of any pedal body (expanded by margin); keeps the cable/plug from clipping through
      const _l = new THREE.Vector3();
      function collidePedals(p, margin) {
        for (const b of pedalBoxes) {
          _l.copy(p).applyMatrix4(b.inv);
          const nx = b.min.x - margin, px = b.max.x + margin, ny = b.min.y - margin, py = b.max.y + margin, nz = b.min.z - margin, pz = b.max.z + margin;
          if (_l.x > nx && _l.x < px && _l.y > ny && _l.y < py && _l.z > nz && _l.z < pz) {
            const dx1 = _l.x - nx, dx2 = px - _l.x, dy2 = py - _l.y, dz1 = _l.z - nz, dz2 = pz - _l.z;
            const m = Math.min(dx1, dx2, dy2, dz1, dz2); // never push out the bottom — the pedal sits on the floor
            if (m === dx1) _l.x = nx; else if (m === dx2) _l.x = px;
            else if (m === dy2) _l.y = py;
            else if (m === dz1) _l.z = nz; else _l.z = pz;
            _l.applyMatrix4(b.mat); p.copy(_l);
          }
        }
      }
      const pts = [];
      for (let i = 0; i < N; i++) {
        const p = new THREE.Vector3().lerpVectors(A0, B0, i / (N - 1));
        pts.push({ p: p.clone(), pp: p.clone(), pinned: i === 0 || i === N - 1 });
      }
      const ends = [
        { anchor: A0.clone(), plugged: null, idx: 0, q: new THREE.Quaternion(), aligning: -1 },
        { anchor: B0.clone(), plugged: null, idx: N - 1, q: new THREE.Quaternion(), aligning: -1 },
      ];

      function resolve(p) { collidePedals(p, CABLE_R); if (p.y < CABLE_R) p.y = CABLE_R; }

      function step() {
        // an end is fixed only while grabbed or plugged; otherwise it's a free point that falls to the floor
        pts[0].pinned = grabbed === 0 || ends[0].plugged !== null;
        pts[N - 1].pinned = grabbed === 1 || ends[1].plugged !== null;

        for (let i = 0; i < N; i++) {
          const q = pts[i]; if (q.pinned) continue;
          const vx = (q.p.x - q.pp.x) * DAMP, vy = (q.p.y - q.pp.y) * DAMP, vz = (q.p.z - q.pp.z) * DAMP;
          q.pp.copy(q.p);
          q.p.x += vx; q.p.y += vy + GRAV; q.p.z += vz;
          resolve(q.p);
        }
        // hold fixed ends at their targets (grabbed = pointer, plugged = socket), kept out of the pedal body
        if (pts[0].pinned) { collidePedals(ends[0].anchor, 0.12); pts[0].p.copy(ends[0].anchor); pts[0].pp.copy(ends[0].anchor); }
        if (pts[N - 1].pinned) { collidePedals(ends[1].anchor, 0.12); pts[N - 1].p.copy(ends[1].anchor); pts[N - 1].pp.copy(ends[1].anchor); }

        for (let k = 0; k < ITER; k++) {
          for (let i = 0; i < N - 1; i++) {
            const a = pts[i], b = pts[i + 1];
            const dx = b.p.x - a.p.x, dy = b.p.y - a.p.y, dz = b.p.z - a.p.z;
            const d = Math.hypot(dx, dy, dz) || 1e-6, diff = (d - SEG) / d;
            const mA = a.pinned ? 0 : b.pinned ? 1 : 0.5, mB = b.pinned ? 0 : a.pinned ? 1 : 0.5;
            a.p.x += dx * diff * mA; a.p.y += dy * diff * mA; a.p.z += dz * diff * mA;
            b.p.x -= dx * diff * mB; b.p.y -= dy * diff * mB; b.p.z -= dz * diff * mB;
          }
        }
        // bending stiffness: ease interior points toward the neighbour midline. Shift the PREVIOUS
        // position by the same amount so this adds zero velocity — otherwise it injects a travelling wave.
        for (let pass = 0; pass < BEND_PASS; pass++) {
          for (let i = 1; i < N - 1; i++) {
            const q = pts[i]; if (q.pinned) continue;
            const dx = ((pts[i - 1].p.x + pts[i + 1].p.x) * 0.5 - q.p.x) * BEND;
            const dy = ((pts[i - 1].p.y + pts[i + 1].p.y) * 0.5 - q.p.y) * BEND;
            const dz = ((pts[i - 1].p.z + pts[i + 1].p.z) * 0.5 - q.p.z) * BEND;
            q.p.x += dx; q.p.y += dy; q.p.z += dz;
            q.pp.x += dx; q.pp.y += dy; q.pp.z += dz;
          }
        }
        for (let i = 0; i < N; i++) if (!pts[i].pinned) resolve(pts[i].p);
        // plug ends ride on the fat barrel (not the thin cable) so they don't sink into the floor
        if (!pts[0].pinned && pts[0].p.y < BARREL_R) pts[0].p.y = BARREL_R;
        if (!pts[N - 1].pinned && pts[N - 1].p.y < BARREL_R) pts[N - 1].p.y = BARREL_R;
      }

      const cableMat = new THREE.MeshStandardMaterial({ color: "#0d0d10", roughness: 0.5, metalness: 0, envMapIntensity: 0.7 });
      const cable = new THREE.Mesh(new THREE.BufferGeometry(), cableMat);
      cable.castShadow = true; scene.add(cable);
      function rebuildCable() {
        const curve = new THREE.CatmullRomCurve3(pts.map((q) => q.p), false, "centripetal");
        cable.geometry.dispose();
        cable.geometry = new THREE.TubeGeometry(curve, 48, CABLE_R, 9, false);
      }

      const tan = new THREE.Vector3(), targetQ = new THREE.Quaternion(), exit = new THREE.Vector3();
      function placeJack(jack, end, endIdx, nextIdx) {
        if (end.plugged !== null) {
          // seated: axial in the jack, tip inside the pedal
          targetQ.setFromUnitVectors(JACK_AXIS, sockets[end.plugged].dir);
          end.q.copy(targetQ);
        } else if (end.aligning >= 0) {
          // approaching a jack: rotate so the tip presents toward the socket, ready to insert
          targetQ.setFromUnitVectors(JACK_AXIS, sockets[end.aligning].dir);
          end.q.slerp(targetQ, 0.22);
        } else {
          tan.subVectors(pts[nextIdx].p, pts[endIdx].p).normalize();
          targetQ.setFromUnitVectors(JACK_AXIS, tan);
          end.q.slerp(targetQ, 0.3);
        }
        jack.quaternion.copy(end.q);
        exit.copy(EXIT_LOCAL).applyQuaternion(end.q);
        jack.position.copy(pts[endIdx].p).sub(exit);
      }

      // keep a non-seated plug's metal tip from penetrating a pedal body (so it can't enter the side)
      const _tip = new THREE.Vector3(), _tipB = new THREE.Vector3();
      function keepPlugOut(end, endIdx, jack) {
        if (end.plugged !== null) return;
        jack.updateMatrixWorld();
        _tip.set(0, 0, -PLUG_LEN / 2).applyMatrix4(jack.matrixWorld);
        _tipB.copy(_tip); collidePedals(_tipB, CABLE_R);
        if (_tipB.distanceToSquared(_tip) > 1e-9) {
          _tipB.sub(_tip);
          pts[endIdx].p.add(_tipB); pts[endIdx].pp.add(_tipB); end.anchor.add(_tipB);
        }
      }

      // ---------- grab + plug ----------
      const ray = new THREE.Raycaster(), ndc = new THREE.Vector2(), plane = new THREE.Plane();
      const hit = new THREE.Vector3(), gStart = new THREE.Vector3(), aStart = new THREE.Vector3();
      const proj = new THREE.Vector3();
      let grabbed = null;
      let draggingKnob = null, knobStartY = 0, knobStartV = 0;
      // the cable simulates only while awake; it sleeps once at rest, and wakes on grab / hover / motion
      let sleeping = false, stillFrames = 0, wakeAt = performance.now();
      const wake = () => { sleeping = false; stillFrames = 0; wakeAt = performance.now(); };
      // approach: within ALIGN_PX the plug rotates to face the jack; within SEAT_PX it seats.
      // plug inserts only to its shoulder (~42% shaft); barrel-exit sits OUTSET out from the face.
      const ALIGN_PX = 150, SEAT_PX = 46, OUTSET = 0.58 * PLUG_LEN;
      const setNdc = (e) => { ndc.x = (e.clientX / window.innerWidth) * 2 - 1; ndc.y = -(e.clientY / window.innerHeight) * 2 + 1; };
      const jacks = [jackA, jackB];
      const screenOf = (v) => { proj.copy(v).project(camera); return [(proj.x * 0.5 + 0.5) * window.innerWidth, (-proj.y * 0.5 + 0.5) * window.innerHeight]; };
      const nearestSocket = (px, py, maxPx) => {
        let idx = -1, best = maxPx;
        sockets.forEach((s, i) => { const [sx, sy] = screenOf(s.pos); const d = Math.hypot(sx - px, sy - py); if (d < best) { best = d; idx = i; } });
        return idx;
      };

      // ---- minimal orbit camera (drag empty space to rotate, wheel to zoom) ----
      const TARGET = new THREE.Vector3(0, 0.8, 0);
      const orbit = { r: 12.6, theta: 0, phi: 0.8, on: false, px: 0, py: 0 };
      function applyOrbit() {
        const sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
        camera.position.set(TARGET.x + orbit.r * sp * Math.sin(orbit.theta), TARGET.y + orbit.r * cp, TARGET.z + orbit.r * sp * Math.cos(orbit.theta));
        camera.lookAt(TARGET);
      }
      applyOrbit();

      renderer.domElement.addEventListener("pointerdown", (e) => {
        wake();
        setNdc(e); ray.setFromCamera(ndc, camera);
        // knobs / footswitch take priority
        const km = knobs.map((k) => k.mesh);
        const kh = ray.intersectObjects(km, false);
        if (kh.length) {
          const k = knobs[km.indexOf(kh[0].object)];
          if (k.kind === "toggle") { k.pos = (k.pos % 3) + 1; applyKnob(k); updateParams(); }
          else if (k.kind === "button") { k.engaged = !k.engaged; k.pressAt = performance.now(); updateParams(); } // latch state, momentary press
          else if (k.kind === "knob") { draggingKnob = k; knobStartY = e.clientY; knobStartV = k.value; document.body.style.cursor = "ns-resize"; }
          return;
        }
        let pick = -1, dist = Infinity;
        jacks.forEach((j, i) => { const h = ray.intersectObject(j, true); if (h.length && h[0].distance < dist) { dist = h[0].distance; pick = i; } });
        if (pick >= 0) {
          grabbed = pick; ends[pick].plugged = null; ends[pick].aligning = -1;
          ends[pick].anchor.copy(pts[ends[pick].idx].p); // grab from wherever the plug currently is (e.g. the floor)
          const nrm = new THREE.Vector3(); camera.getWorldDirection(nrm);
          plane.setFromNormalAndCoplanarPoint(nrm, ends[pick].anchor);
          ray.ray.intersectPlane(plane, gStart); aStart.copy(ends[pick].anchor);
          document.body.style.cursor = "grabbing";
        } else {
          orbit.on = true; orbit.px = e.clientX; orbit.py = e.clientY;
        }
      });
      window.addEventListener("pointermove", (e) => {
        if (draggingKnob) {
          draggingKnob.value = Math.min(1, Math.max(0, knobStartV + (knobStartY - e.clientY) * 0.005));
          applyKnob(draggingKnob); updateParams();
          return;
        }
        if (orbit.on) {
          orbit.theta -= (e.clientX - orbit.px) * 0.005;
          orbit.phi = Math.min(1.5, Math.max(0.15, orbit.phi - (e.clientY - orbit.py) * 0.005));
          orbit.px = e.clientX; orbit.py = e.clientY; applyOrbit();
          return;
        }
        if (grabbed === null) {
          setNdc(e); ray.setFromCamera(ndc, camera);
          let over = false; jacks.forEach((j) => { if (ray.intersectObject(j, true).length) over = true; });
          document.body.style.cursor = over ? "grab" : "default";
          if (over) wake();
          return;
        }
        setNdc(e); ray.setFromCamera(ndc, camera);
        if (ray.ray.intersectPlane(plane, hit)) ends[grabbed].anchor.copy(aStart).add(hit.clone().sub(gStart));
        // phase 1: align when the jack is near a socket; phase 2: seat when moved into it
        const near = nearestSocket(e.clientX, e.clientY, ALIGN_PX);
        ends[grabbed].aligning = near;
        if (near >= 0) {
          const [sx, sy] = screenOf(sockets[near].pos);
          if (Math.hypot(sx - e.clientX, sy - e.clientY) < SEAT_PX) {
            ends[grabbed].plugged = near;
            ends[grabbed].anchor.copy(sockets[near].pos).addScaledVector(sockets[near].dir, OUTSET);
            ends[grabbed].aligning = -1; grabbed = null; document.body.style.cursor = "default";
          }
        }
      });
      window.addEventListener("pointerup", () => {
        draggingKnob = null;
        if (grabbed !== null) ends[grabbed].aligning = -1;
        grabbed = null; orbit.on = false; document.body.style.cursor = "default"; wake();
      });
      renderer.domElement.addEventListener("wheel", (e) => {
        orbit.r = Math.min(28, Math.max(5, orbit.r * (1 + e.deltaY * 0.001))); applyOrbit(); e.preventDefault();
      }, { passive: false });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.__scr = (arr) => { const v = new THREE.Vector3(arr[0], arr[1], arr[2]).project(camera); return [(v.x * 0.5 + 0.5) * window.innerWidth, (-v.y * 0.5 + 0.5) * window.innerHeight]; };
      window.__socks = sockets.map((s) => s.pos.toArray());
      window.__ends = () => [pts[0].p.toArray(), pts[N - 1].p.toArray()];
      window.__diag = () => ({ sleeping, plugged: [ends[0].plugged, ends[1].plugged], grabbed });
      window.__knobpos = () => knobs.map((k) => { const g = k.mesh.geometry, idx = g.index.array, pos = g.attributes.position; const c = new THREE.Vector3(), t = new THREE.Vector3(); const u = new Set(idx); u.forEach((i) => { t.fromBufferAttribute(pos, i); c.add(t); }); c.multiplyScalar(1 / u.size); k.mesh.updateWorldMatrix(true, false); k.mesh.localToWorld(c); return { key: k.F.key, dev: k.deviceName, p: c.toArray() }; });
      window.__raytest = (sx, sy) => { ndc.set((sx / window.innerWidth) * 2 - 1, -(sy / window.innerHeight) * 2 + 1); ray.setFromCamera(ndc, camera); const h = ray.intersectObjects(knobs.map((k) => k.mesh), false); return h.length ? knobs.find((k) => k.mesh === h[0].object).F.key : "MISS"; };

      (function loop() {
        if (grabbed !== null) sleeping = false; // always simulate while a plug is held
        if (!sleeping) {
          step(); rebuildCable();
          placeJack(jackA, ends[0], 0, 1);
          placeJack(jackB, ends[1], N - 1, N - 2);
          keepPlugOut(ends[0], 0, jackA);
          keepPlugOut(ends[1], N - 1, jackB);
          placeJack(jackA, ends[0], 0, 1);
          placeJack(jackB, ends[1], N - 1, N - 2);
          // fall asleep once the cable is at rest, or ~2.5s after the last interaction (backstop for slow creep)
          let mv = 0;
          for (let i = 0; i < N; i++) {
            if (pts[i].pinned) continue;
            const dx = pts[i].p.x - pts[i].pp.x, dy = pts[i].p.y - pts[i].pp.y, dz = pts[i].p.z - pts[i].pp.z;
            const e = dx * dx + dy * dy + dz * dz; if (e > mv) mv = e;
          }
          if (grabbed === null && mv < 2e-5) stillFrames++; else stillFrames = 0;
          if (grabbed === null && (stillFrames > 14 || performance.now() - wakeAt > 1500)) {
            sleeping = true; for (let i = 0; i < N; i++) pts[i].pp.copy(pts[i].p); // freeze fully
          }
        }
        // socket affordance: the pedal's metal nut shines when a plug is approaching
        sockets.forEach((s, i) => {
          const active = ends.some((e) => e.aligning === i);
          s.light.intensity += ((active ? 7 : 0) - s.light.intensity) * 0.25;
        });
        // footswitch press
        knobs.forEach((k) => {
          if (k.kind === "button") { const el = performance.now() - k.pressAt, DUR = 170; k.pivot.position.z = el < DUR ? -Math.sin(Math.PI * el / DUR) * 0.05 : 0; } // momentary dip, springs back
          else if (k.kind === "led") { const fs = knobs.find((x) => x.deviceName === k.deviceName && x.kind === "button"); k.mesh.material.emissiveIntensity += (((fs && fs.engaged) ? 1.7 : 0) - k.mesh.material.emissiveIntensity) * 0.18; }
        });
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      })();
      window.__ready = true;
    }
  })();
  </script>
</body>
</html>
